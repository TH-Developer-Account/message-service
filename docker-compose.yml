services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80" # ALB forwards HTTP to port 80 after TLS termination
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 100m

  app:
    build: .
    volumes:
      - ./logs:/app/logs
    expose:
      - "3000" # internal only — Nginx proxies to app:3000; port not exposed to host
    env_file:
      - .env
    extra_hosts:
      - "th-s4-qas-ad.tatahitachi.co.in:10.83.196.87"
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 2g # 2 PM2 workers × 150M + PM2 overhead

  redis:
    image: redis:latest
    command: redis-server --maxmemory 200mb --maxmemory-policy noeviction --appendonly yes
    expose:
      - "6379" # internal only — only the app container needs Redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 300m

volumes:
  redis_data:
