services:
  app:
    build: .
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 400m

  redis:
    image: redis:latest
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 300m

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  redis_data:
