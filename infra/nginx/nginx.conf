worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Server hardening ─────────────────────────────────────────────────
    server_tokens off;

    # ── Real-IP extraction ───────────────────────────────────────────────
    set_real_ip_from  10.0.0.0/22;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Rate limiting zones ──────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=global:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstreams ────────────────────────────────────────────────────────
    upstream whatsapp_app {
        server app:3000;      # 'app' matches service name in whatsapp docker-compose.yml
        keepalive 32;
    }

    upstream api {
        server api:8000;      # 'api' matches service name in api docker-compose.yml
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;   # 'frontend' matches service name in frontend docker-compose.yml
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Connection cap per IP ────────────────────────────────────────
        limit_conn conn 20;

        # ── Request rate cap ─────────────────────────────────────────────
        limit_req zone=global burst=60 nodelay;
        limit_req_status 429;

        # ── Payload size ─────────────────────────────────────────────────
        client_max_body_size 1m;

        # ── Timeout protection ───────────────────────────────────────────
        client_body_timeout   10s;
        client_header_timeout 10s;
        send_timeout          10s;
        keepalive_timeout     65s;

        # ── Restrict HTTP methods ────────────────────────────────────────
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE)$) {
            return 405;
        }

        # ── Health check ─────────────────────────────────────────────────
        location = /health {
            proxy_pass            http://whatsapp_app;
            proxy_http_version    1.1;
            proxy_set_header      Connection        "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $remote_addr;
            proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 3s;
            proxy_read_timeout    10s;
        }

        # ── API service ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass            http://api;
            proxy_http_version    1.1;
            proxy_set_header      Connection        "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $remote_addr;
            proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 5s;
            proxy_read_timeout    40s;
            proxy_send_timeout    40s;
        }

        # ── WhatsApp service ─────────────────────────────────────────────
        location ~ ^/(webhook|fetch-machine-serials) {
            proxy_pass            http://whatsapp_app;
            proxy_http_version    1.1;
            proxy_set_header      Connection        "";
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $remote_addr;
            proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 5s;
            proxy_read_timeout    40s;
            proxy_send_timeout    40s;
        }
    }
}