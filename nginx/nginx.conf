events {}

http {
  server {
    listen 80;
    server_name yourdomain.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name yourdomain.com;

    ssl_certificate /etc/nginx/certs/fullchain.crt;  # recommended
    ssl_certificate_key /etc/nginx/certs/private.key;

    # If vendor gave CA bundle separately (optional)
    ssl_trusted_certificate /etc/nginx/certs/ca_bundle.crt;

    location /webhook {
      proxy_pass http://app:3000/webhook;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional (for testing/debugging)
    location / {
      proxy_pass http://app:3000;
    }
  }
}