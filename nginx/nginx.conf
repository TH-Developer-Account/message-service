# nginx/nginx.conf
#
# Sits between the AWS ALB and the Node.js app container.
# TLS is terminated at the ALB, so Nginx only handles port 80 (HTTP).
#
# Traffic path: Internet → ALB:443 (TLS) → EC2:80 → Nginx → app:3000
#
# Responsibilities:
#   - Real-IP extraction from ALB's X-Forwarded-For header
#   - Per-IP rate limiting and connection limiting (DDoS / abuse)
#   - Request body size cap
#   - Slow-loris / timeout protection
#   - Proxy headers for Node.js (X-Real-IP, X-Forwarded-Proto, etc.)
#   - Security: hide Nginx version, restrict HTTP methods

worker_processes auto;  # one per CPU core

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Server hardening ────────────────────────────────────────────────────
    server_tokens off;          # don't expose Nginx version in headers/errors

    # ── Real-IP extraction ──────────────────────────────────────────────────
    # The ALB sits inside the VPC and appends the real client IP to
    # X-Forwarded-For before forwarding to this Nginx instance.
    # Replace 10.0.0.0/8 with your actual VPC CIDR if it differs.
    set_real_ip_from  10.0.0.0/22;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    # After this block, $remote_addr = the real client IP everywhere below.

    # ── Rate limiting zones (keyed on real client IP) ───────────────────────
    limit_req_zone  $binary_remote_addr zone=global:10m  rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream ────────────────────────────────────────────────────────────
    upstream app {
        server app:3000;
        keepalive 32;   # reuse connections to the app container
    }

    server {
        listen 80;
        server_name _;  # ALB handles hostname routing; accept any

        # ── Connection cap per IP ──────────────────────────────────────────
        # Prevents a single IP from holding many open connections (slow-loris).
        limit_conn conn 20;

        # ── Request rate cap per IP ────────────────────────────────────────
        # 30 req/s with a burst of 60. Meta webhook batches events so even a
        # busy bot rarely exceeds 5-10 r/s from a single IP.
        limit_req zone=global burst=60 nodelay;
        limit_req_status 429;

        # ── Payload size ───────────────────────────────────────────────────
        client_max_body_size 1m;

        # ── Timeout protection ─────────────────────────────────────────────
        client_body_timeout    10s;
        client_header_timeout  10s;
        send_timeout           10s;
        keepalive_timeout      65s;

        # ── Restrict HTTP methods ──────────────────────────────────────────
        if ($request_method !~ ^(GET|POST)$) {
            return 405;
        }

        # ── Health check — bypass rate limit (ALB probes every 15 s) ───────
        location = /health {
    proxy_pass         http://app;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $remote_addr;
    proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_connect_timeout  3s;
    proxy_read_timeout    10s;
}

        # ── All other routes ───────────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # required for upstream keepalive

            # Pass real client identity to Node.js.
            # With app.set("trust proxy", 2), req.ip will equal X-Real-IP.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

            # Slightly above the app's own 35 s request timeout so Node.js
            # errors cleanly rather than Nginx timing out first.
            proxy_connect_timeout  5s;
            proxy_read_timeout    40s;
            proxy_send_timeout    40s;
        }
    }
}